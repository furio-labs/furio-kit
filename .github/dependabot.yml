version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Keeps GitHub Actions current so action runtimes (e.g. node20 -> node24)
  # don't silently drift into deprecation. One isolated PR per action.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
